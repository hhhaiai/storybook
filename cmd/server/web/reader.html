<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{{.Title}}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;background:#0a0c13;color:#e5e5e5;display:flex;flex-direction:column}

/* 阅读器主区域 */
.reader{flex:1;overflow:hidden;position:relative;padding:16px 20px}

/* 页容器 */
.page{position:absolute;inset:0;display:none;flex-direction:row;opacity:0;transition:opacity .35s ease;border-radius:14px;overflow:hidden;box-shadow:0 4px 30px rgba(0,0,0,.3)}
.page.active{display:flex;opacity:1}

/* 左侧图片区 — 点击上一页 */
.img-side{flex:0 0 60%;position:relative;cursor:pointer;overflow:hidden;user-select:none;background:#111}
.img-side img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.img-side:hover img{transform:scale(1.02)}
.img-side .prev-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-start;padding-left:24px;opacity:0;transition:opacity .25s;background:linear-gradient(to right,rgba(0,0,0,.4),transparent 50%)}
.img-side:hover .prev-overlay{opacity:1}
.prev-overlay .arrow-icon{background:rgba(255,255,255,.2);backdrop-filter:blur(8px);color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:22px;display:flex;align-items:center;justify-content:center}

/* 右侧文字区 — 点击下一页 */
.text-side{flex:1;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;user-select:none;background:linear-gradient(180deg,#fafbfc 0%,#f5f6f8 100%);position:relative;border-left:1px solid #e8eaed;overflow:auto}
.text-side .text-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:36px 32px}
.text-side .text-body p{font-size:20px;line-height:2.1;color:#1a1a2e;text-indent:2em;margin-bottom:14px}
.text-side .text-body p:first-child::first-letter{font-size:2.4em;font-weight:700;float:left;line-height:1;margin-right:6px;color:#2d3748}
.text-side .text-footer{padding:12px 24px;border-top:1px solid #eef0f3;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#9ca3af}
.text-side .next-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:24px;opacity:0;transition:opacity .25s;background:linear-gradient(to left,rgba(0,0,0,.08),transparent 50%);pointer-events:none}
.text-side:hover .next-overlay{opacity:1}
.next-overlay .arrow-icon{background:rgba(0,0,0,.06);color:#555;border:none;border-radius:50%;width:48px;height:48px;font-size:20px;display:flex;align-items:center;justify-content:center}

/* 封面海报页 — 全屏图片 + 标题叠加 */
.page.poster{display:none}
.page.poster.active{display:flex}
.poster .img-side{flex:1}
.poster-info{position:absolute;bottom:0;left:0;right:0;padding:32px 36px;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,rgba(0,0,0,.4) 50%,transparent 100%)}
.poster-title{font-size:34px;font-weight:800;color:#fff;text-shadow:0 4px 24px rgba(0,0,0,.7);letter-spacing:2px;line-height:1.4}
.poster-sub{font-size:14px;color:rgba(255,255,255,.7);margin-top:8px}
.poster-hint{font-size:13px;color:rgba(255,255,255,.5);margin-top:14px;animation:hintPulse 2s ease infinite}
@keyframes hintPulse{0%,100%{opacity:.5}50%{opacity:1}}

/* 底部导航栏 */
.nav{padding:12px 28px;background:#0a0c13;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.nav-btn{background:rgba(255,255,255,.08);color:#e5e5e5;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 28px;font-size:14px;cursor:pointer;min-width:130px;transition:all .2s;display:flex;align-items:center;gap:8px;font-weight:500}
.nav-btn:hover:not(:disabled){background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.25)}
.nav-btn:disabled{opacity:.2;cursor:default}
.nav-center{display:flex;flex-direction:column;align-items:center;gap:6px}
.page-counter{font-size:15px;font-weight:600;letter-spacing:1px;color:#ccc}
.page-counter .cur{font-size:22px;color:#4f8cff;font-weight:700}
.page-dots{display:flex;gap:4px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.12);transition:all .2s}
.dot.active{background:#4f8cff;width:18px;border-radius:3px}

/* 响应式：窄屏切上下布局 */
@media(max-width:860px){
  .page.active{flex-direction:column}
  .img-side{flex:0 0 50%}
  .text-side{flex:1;border-left:none;border-top:1px solid #e8eaed}
  .text-side .text-body{padding:20px 18px}
  .text-side .text-body p{font-size:17px;line-height:1.8}
  .text-side .text-body p:first-child::first-letter{font-size:2em}
  .poster-title{font-size:24px}
}
</style>
</head>
<body>

<div class="reader" id="reader"></div>

<div class="nav">
  <button class="nav-btn" id="prevBtn" onclick="goPrev()">
    <span>←</span> <span>上一页</span>
  </button>
  <div class="nav-center">
    <div class="page-counter"><span class="cur" id="curPage">1</span> / <span id="totalPage">1</span></div>
    <div class="page-dots" id="dots"></div>
  </div>
  <button class="nav-btn" id="nextBtn" onclick="goNext()">
    <span>下一页</span> <span>→</span>
  </button>
</div>

<script>
var pages = {{.PagesJSON}};
var cur = 0;

function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'):''}

function renderPages(){
  var html='';
  for(var i=0;i<pages.length;i++){
    var p=pages[i];
    var img=p.image||('images/'+(i+1)+'.jpg');
    var isActive=i===cur?' active':'';

    if(i===0){
      // 封面海报页：全屏图片 + 叠加标题
      html+='<div class="page poster'+isActive+'" data-idx="'+i+'">'
        +'<div class="img-side" onclick="goNext()">'
        +'<img src="'+img+'" alt="封面"/>'
        +'<div class="poster-info">'
        +'<div class="poster-title">'+esc(p.text||'')+'</div>'
        +'<div class="poster-sub">'+esc(p.subtitle||'')+'</div>'
        +'<div class="poster-hint">点击翻页 →</div>'
        +'</div>'
        +'</div>'
        +'</div>';
      continue;
    }

    // 内容页：左侧图片（点击上一页）+ 右侧文字（点击下一页）
    var txt=(p.text||'').split('\n').filter(function(x){return x.trim()}).map(function(x){
      return '<p>'+esc(x.trim())+'</p>';
    }).join('');

    html+='<div class="page'+isActive+'" data-idx="'+i+'">'
      // 左侧图片区
      +'<div class="img-side" onclick="goPrev()">'
      +'<img src="'+img+'" alt="第'+(i+1)+'页"/>'
      +'<div class="prev-overlay"><div class="arrow-icon">←</div></div>'
      +'</div>'
      // 右侧文字区
      +'<div class="text-side" onclick="goNext()">'
      +'<div class="text-body">'+txt+'</div>'
      +'<div class="text-footer">'
      +'<span>第 '+(i+1)+' 页</span>'
      +'<span>'+(i<pages.length-1?'下一页 →':'已到末页')+'</span>'
      +'</div>'
      +'<div class="next-overlay"><div class="arrow-icon">→</div></div>'
      +'</div>'
      +'</div>';
  }
  document.getElementById('reader').innerHTML=html;
}

function showPage(idx){
  if(idx<0||idx>=pages.length)return;
  cur=idx;
  var all=document.querySelectorAll('.page');
  for(var i=0;i<all.length;i++){
    if(i===cur){
      all[i].classList.add('active');
    }else{
      all[i].classList.remove('active');
    }
  }
  document.getElementById('curPage').textContent=cur+1;
  document.getElementById('totalPage').textContent=pages.length;
  document.getElementById('prevBtn').disabled=cur===0;
  document.getElementById('nextBtn').disabled=cur===pages.length-1;
  renderDots();
}

function goPrev(){if(cur>0)showPage(cur-1);}
function goNext(){if(cur<pages.length-1)showPage(cur+1);}

function renderDots(){
  var dots=document.getElementById('dots');
  var n=pages.length;
  if(n<=1){dots.innerHTML='';return;}
  var maxDots=Math.min(n,25);
  var step=n<=maxDots?1:Math.ceil(n/maxDots);
  var html='';
  for(var i=0;i<n;i+=step){
    var isCur=cur>=i&&cur<i+step;
    html+='<div class="dot'+(isCur?' active':'')+'"></div>';
  }
  dots.innerHTML=html;
}

// 键盘翻页
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'){e.preventDefault();goPrev();}
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();goNext();}
});

// 触摸滑动
var touchStartX=0;
document.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',function(e){
  var diff=touchStartX-e.changedTouches[0].clientX;
  if(Math.abs(diff)>50){
    if(diff>0)goNext();else goPrev();
  }
});

renderPages();
showPage(0);
</script>
</body>
</html>
